name: CVMS build

on:
  workflow_call:
    inputs:
      push:
        required: true
        type: boolean

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Checkout repository under $GITHUB_WORKSPACE path
      - name: Repository checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0

      # DockerHub Login
      #- name: Login to DockerHub
      #  uses: docker/login-action@v3
      #  with:
      #    username: ${{ secrets.DOCKER_USERNAME }}
      #    password: ${{ secrets.DOCKER_PUSH_TOKEN }}

      # Assume gitHubdeploymentsRole AWS role
      - name: Configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::291847425310:role/gitHubdeploymentsRole
          role-session-name: deploymentsRole
          role-duration-seconds: 900
          aws-region: us-east-1

      # Login to AWS ECR
      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      # Set-up Docker Buildx
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Set-up Docker cache layer
      - uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: ${{ github.job }}-${{ runner.os }}-buildx-cvms
          restore-keys: |
            ${{ github.job }}-${{ runner.os }}-buildx-cvms

      # Configure tag name
      - name: Sets env vars
        run: |
            echo "DOCKER_IMAGE_NAME=peersyst/cvms" >> $GITHUB_ENV

      # Build docker image
      - name: Build docker image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: Dockerfile
            push: ${{ inputs.push }}
            tags: ${{ env.DOCKER_IMAGE_NAME }}
            cache-from: type=local,src=/tmp/.buildx-cache
            cache-to: type=local,dest=/tmp/.buildx-cache-new
      - name: Move cache
        if: always()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
